<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Management - Mock Exam 2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 850px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .quiz-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-weight: 500; }
        .question { margin-bottom: 30px; padding: 20px; border-left: 5px solid #3498db; background-color: #fff; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; border-radius: 4px; }
        .question-text { font-size: 1.1em; font-weight: 600; color: #2c3e50; margin-bottom: 12px; }
        .metadata { font-size: 0.85em; color: #95a5a6; margin-bottom: 15px; display: block; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px 15px; border: 1px solid #dcdde1; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; background: white; }
        .option:hover { background-color: #f1f2f6; }
        .selected { background-color: #e1f5fe !important; border-color: #3498db !important; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #submit-btn { display: block; width: 100%; padding: 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 30px; transition: background 0.3s; }
        #submit-btn:hover { background: #27ae60; }
        #result { margin-top: 30px; padding: 20px; border-radius: 8px; font-size: 1.3em; font-weight: bold; text-align: center; display: none; background-color: #fff; border: 2px solid #2ecc71; color: #27ae60; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Principles of Management</h1>
    <div class="subtitle">Mock Exam 2 | Course ID: noc26_mg72</div>
    <div id="quiz"></div>
    <button id="submit-btn">Submit Practice Exam</button>
    <div id="result"></div>
</div>

<script>
const quizData = [
    { q: "Q1. 'Doing things right' and getting the most output for the least amount of input describes which core management concept?", a: "C", options: { A: "Effectiveness", B: "Management", C: "Efficiency", D: "Organization" }, meta: "Source: Lecture_W1L18 | Difficulty: Easy" },
    { q: "Q2. Which managerial skill is most crucial for first-line managers, as they are closest to the actual work being done?", a: "C", options: { A: "Conceptual Skills", B: "Human Skills", C: "Technical Skills", D: "Strategic Skills" }, meta: "Source: Lecture_W1L19 | Difficulty: Easy" },
    { q: "Q3. A management approach that seeks to balance well-being for multiple stakeholders, moving beyond a purely financial bottom line, is known as:", a: "B", options: { A: "Traditional Management", B: "Multistream Management", C: "Shareholder Management", D: "Efficiency-focused Management" }, meta: "Source: Lecture_W1L20 | Difficulty: Hard" },
    { q: "Q4. In the 'Old Workplace,' what was typically considered the primary resource?", a: "B", options: { A: "Information and knowledge", B: "Physical assets (land, capital, machinery)", C: "Employee empowerment", D: "Digital technology" }, meta: "Source: Lecture_W1L21 | Difficulty: Easy" },
    { q: "Q5. According to Hersey & Blanchard's Situational Leadership Theory, which style is most appropriate for R1 followers (unable and unwilling/insecure)?", a: "D", options: { A: "Selling", B: "Participating", C: "Delegating", D: "Telling" }, meta: "Source: Lecture_W10L83 | Difficulty: Medium" },
    { q: "Q6. Which of the 'Four I's' of transformational leadership involves challenging followers to question assumptions and think creatively?", a: "C", options: { A: "Idealized Influence", B: "Inspirational Motivation", C: "Intellectual Stimulation", D: "Individualized Consideration" }, meta: "Source: Lecture_W10L84 | Difficulty: Medium" },
    { q: "Q7. Which type of power is derived from an individual's unique characteristics (special skills, knowledge, or charisma)?", a: "D", options: { A: "Coercive Power", B: "Reward Power", C: "Legitimate Power", D: "Personal Power" }, meta: "Source: Lecture_W10L85 | Difficulty: Medium" },
    { q: "Q8. In the Shannon-Weaver Communication Model, what is the term for anything that interferes with the message?", a: "C", options: { A: "Feedback", B: "Channel", C: "Noise", D: "Encoding" }, meta: "Source: Lecture_W11L88 | Difficulty: Easy" },
    { q: "Q9. A manager in a bad mood communicates harshly, leading to misinterpretation. This is an example of which barrier?", a: "D", options: { A: "Semantic Barrier", B: "Physical Barrier", C: "Organizational Barrier", D: "Personal & Intrapersonal Barrier" }, meta: "Source: Lecture_W11L89 | Difficulty: Medium" },
    { q: "Q10. In Transactional Analysis, when an Adult ego state question receives a Child ego state response, this is a(n):", a: "B", options: { A: "Complementary Transaction", B: "Crossed Transaction", C: "Parallel Transaction", D: "Adult-to-Adult Transaction" }, meta: "Source: Lecture_W11L90 | Difficulty: Hard" },
    { q: "Q11. Which network relies on a central figure, resulting in fast communication but low member satisfaction?", a: "B", options: { A: "Chain Network", B: "Wheel Network", C: "All-Channel Network", D: "Grapevine" }, meta: "Source: Lecture_W11L91 | Difficulty: Easy" },
    { q: "Q12. According to Media Richness Theory, which type of media should be used for non-routine or sensitive messages?", a: "B", options: { A: "Lean Media", B: "Rich Media", C: "Formal Reports", D: "Bulletins" }, meta: "Source: Lecture_W11L92 | Difficulty: Medium" },
    { q: "Q13. Rebranding a 'voluntary retirement scheme' as a 'golden handshake scheme' is an example of which technique?", a: "D", options: { A: "Education & Communication", B: "Participation & Empowerment", C: "Bargaining & Negotiation", D: "Manipulation" }, meta: "Source: Lecture_W12L100 | Difficulty: Hard" },
    { q: "Q14. Which structural variable is conducive to stimulating a culture of innovation?", a: "C", options: { A: "Rigid, top-down structures", B: "High formalization", C: "Flat, flexible organic structures", D: "Siloed communication" }, meta: "Source: Lecture_W12L101 | Difficulty: Easy" },
    { q: "Q15. The formal system of task and authority relationships that controls coordination is known as:", a: "C", options: { A: "Organizational Culture", B: "Organizational Theory", C: "Organizational Structure", D: "Organizational Design" }, meta: "Source: Lecture_W12L95 | Difficulty: Easy" },
    { q: "Q16. According to Greiner's Model, the 'Crisis of Autonomy' typically arises during which growth stage?", a: "B", options: { A: "Creativity", B: "Direction", C: "Delegation", D: "Coordination" }, meta: "Source: Lecture_W12L96 | Difficulty: Medium" },
    { q: "Q17. When Starbucks transformed its business model *before* market conditions forced it, this was which change type?", a: "C", options: { A: "Fine-Tuning", B: "Adaptation", C: "Frame-Bending", D: "Frame-Breaking" }, meta: "Source: Lecture_W12L97 | Difficulty: Hard" },
    { q: "Q18. Which level of resistance is characterized by a tight-knit group powerfully enforcing behaviors opposing change?", a: "B", options: { A: "Individual Level", B: "Group Level", C: "Organizational Level", D: "Managerial Level" }, meta: "Source: Lecture_W12L98 | Difficulty: Medium" },
    { q: "Q19. In Lewin's 3-Step Model, the stage involving challenging the status quo and reducing restraining forces is:", a: "C", options: { A: "Changing", B: "Refreezing", C: "Unfreezing", D: "Adapting" }, meta: "Source: Lecture_W12L99 | Difficulty: Hard" },
    { q: "Q20. Max Weber's concept of bureaucracy emphasized which key feature?", a: "C", options: { A: "Personal loyalty", B: "Informal rules", C: "Formal rules and regulations", D: "Decentralized decisions" }, meta: "Source: Lecture_W2L25 | Difficulty: Easy" },
    { q: "Q21. The Hawthorne Studies demonstrated that which factors had a greater impact on productivity than physical conditions?", a: "C", options: { A: "Financial incentives", B: "Strict supervision", C: "Social and psychological factors", D: "Advanced machinery" }, meta: "Source: Lecture_W2L26 | Difficulty: Medium" },
    { q: "Q22. The Contingency Approach directly challenges which view of classical theorists?", a: "C", options: { A: "The machine metaphor", B: "Human relations", C: "The universalist view", D: "The systems approach" }, meta: "Source: Lecture_W2L27 | Difficulty: Hard" },
    { q: "Q23. A long-term, broad, and aspirational statement providing overall direction is called a(n):", a: "D", options: { A: "Mission", B: "Goal", C: "Strategy", D: "Vision" }, meta: "Source: Lecture_W3L30 | Difficulty: Easy" },
    { q: "Q24. In Porter's Five Forces, which force is high when there are many competitors of similar size and power?", a: "C", options: { A: "Threat of New Entrants", B: "Bargaining Power of Suppliers", C: "Competition in the Industry (Rivalry)", D: "Threat of Substitute Products" }, meta: "Source: Lecture_W3L32 | Difficulty: Hard" },
    { q: "Q25. According to the BCG Matrix, a business unit with high market share in a low-growth market is a:", a: "B", options: { A: "Star", B: "Cash Cow", C: "Question Mark", D: "Dog" }, meta: "Source: Lecture_W3L33 | Difficulty: Medium" },
    { q: "Q26. Which competitive strategy aims to become the lowest-cost producer through operations efficiency?", a: "C", options: { A: "Differentiation", B: "Focus", C: "Cost Leadership", D: "Value Innovation" }, meta: "Source: Lecture_W3L34 | Difficulty: Easy" },
    { q: "Q27. The Delphi Method achieves consensus from experts while eliminating group pressure through:", a: "B", options: { A: "Face-to-face brainstorming", B: "Anonymous questionnaires and iterative feedback", C: "Direct debate", D: "Centralized decision-making" }, meta: "Source: Lecture_W4L39 | Difficulty: Medium" },
    { q: "Q28. The concept of choosing the first alternative that is 'good enough' is known as:", a: "B", options: { A: "Optimization", B: "Satisficing", C: "Maximizing Utility", D: "Rational Choice" }, meta: "Source: Lecture_W5L45 | Difficulty: Hard" },
    { q: "Q29. What phenomenon occurs when conformity pressure prevents a group from appraising unpopular views?", a: "C", options: { A: "Social Loafing", B: "Groupshift", C: "Groupthink", D: "Norming" }, meta: "Source: Lecture_W5L47 | Difficulty: Medium" },
    { q: "Q30. What is the term for unwritten, experience-based knowledge employees possess?", a: "C", options: { A: "Explicit Knowledge", B: "Procedural Knowledge", C: "Tacit Knowledge", D: "Declarative Knowledge" }, meta: "Source: Lecture_W6L52 | Difficulty: Medium" }
];

const quizContainer = document.getElementById('quiz');
const submitBtn = document.getElementById('submit-btn');
const resultContainer = document.getElementById('result');

function buildQuiz() {
    quizData.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.classList.add('question');
        qDiv.innerHTML = `
            <div class="question-text">${item.q}</div>
            <span class="metadata">${item.meta}</span>
            <div class="options" data-index="${index}">
                ${Object.entries(item.options).map(([key, val]) => `
                    <div class="option" data-key="${key}">${key}) ${val}</div>
                `).join('')}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
}

function showResults() {
    let score = 0;
    const questions = document.querySelectorAll('.question');

    quizData.forEach((item, index) => {
        const selected = questions[index].querySelector('.selected');
        const options = questions[index].querySelectorAll('.option');
        
        options.forEach(opt => {
            const optKey = opt.getAttribute('data-key');
            if (optKey === item.a) {
                opt.classList.add('correct');
            }
            if (selected && selected === opt && optKey !== item.a) {
                opt.classList.add('incorrect');
            }
        });

        if (selected && selected.getAttribute('data-key') === item.a) {
            score++;
        }
    });

    resultContainer.style.display = 'block';
    resultContainer.innerHTML = `Practice Exam Complete!<br>Your Score: ${score} / ${quizData.length} (${Math.round((score/quizData.length)*100)}%)`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

buildQuiz();
submitBtn.addEventListener('click', showResults);
</script>

</body>
</html>
