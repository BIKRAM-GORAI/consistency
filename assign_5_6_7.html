<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Management - Assignments (Weeks 5-7)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f4f8; }
        .quiz-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; border-bottom: 3px solid #e67e22; padding-bottom: 10px; }
        h2 { color: #e67e22; border-left: 5px solid #e67e22; padding-left: 15px; margin-top: 40px; background: #fff3e0; padding-top: 5px; padding-bottom: 5px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fff; }
        .question-text { font-size: 1.05em; font-weight: 600; color: #34495e; margin-bottom: 15px; white-space: pre-wrap; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px 15px; border: 2px solid #dee2e6; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; background: white; }
        .option:hover { background-color: #f8f9fa; border-color: #e67e22; }
        .selected { background-color: #fff3e0 !important; border-color: #e67e22 !important; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #submit-btn { display: block; width: 100%; padding: 20px; background: #e67e22; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #submit-btn:hover { background: #d35400; }
        #result { margin-top: 30px; padding: 25px; border-radius: 8px; font-size: 1.5em; font-weight: bold; text-align: center; display: none; background-color: #fff; border: 3px solid #e67e22; color: #2c3e50; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Principles of Management Practice</h1>
    <p style="text-align: center; font-weight: bold;">Assignment Units: Week 5, Week 6, and Week 7</p>

    <div id="quiz"></div>
    <button id="submit-btn">Evaluate My Answers</button>
    <div id="result"></div>
</div>

];

const quizContainer = document.getElementById('quiz');
const submitBtn = document.getElementById('submit-btn');
const resultContainer = document.getElementById('result');

function buildQuiz() {
    quizData.forEach((item, index) => {
        if (item.section) {
            const h2 = document.createElement('h2');
            h2.innerText = item.section;
            quizContainer.appendChild(h2);
        }
        
        const qDiv = document.createElement('div');
        qDiv.classList.add('question');
        qDiv.innerHTML = `
            <div class="question-text">${item.q}</div>
            <div class="options" data-index="${index}">
                ${Object.entries(item.options).map(([key, val]) => `
                    <div class="option" data-key="${key}"><strong>${key})</strong> ${val}</div>
                `).join('')}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
}

function showResults() {
    let score = 0;
    const questions = document.querySelectorAll('.question');

    quizData.forEach((item, index) => {
        const selected = questions[index].querySelector('.selected');
        const options = questions[index].querySelectorAll('.option');
        
        options.forEach(opt => {
            const optKey = opt.getAttribute('data-key');
            if (optKey === item.a) {
                opt.classList.add('correct');
            }
            if (selected && selected === opt && optKey !== item.a) {
                opt.classList.add('incorrect');
            }
        });

        if (selected && selected.getAttribute('data-key') === item.a) {
            score++;
        }
    });

    resultContainer.style.display = 'block';
    resultContainer.innerHTML = `Set Complete!<br>Accuracy: ${score} / ${quizData.length} (${Math.round((score/quizData.length)*100)}%)`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

buildQuiz();
submitBtn.addEventListener('click', showResults);
</script>

</body>
</html>
