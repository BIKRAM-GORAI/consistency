<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Login or create your Consistency Tracker account." />
  <title>Consistency Tracker — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Auth page styles ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 40px 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: authCardIn 0.55s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes authCardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .auth-brand-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 12px #8b5cf6);
    }

    .auth-brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px 16px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    .auth-tab.active {
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      color: #fff;
      box-shadow: 0 2px 14px rgba(139,92,246,0.35);
    }

    .auth-tab:not(.active):hover {
      color: #f1f5f9;
      background: rgba(255,255,255,0.06);
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
      font-weight: 400;
    }

    .auth-field {
      margin-bottom: 16px;
    }

    .auth-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    .auth-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    .auth-input::placeholder { color: #475569; }

    .auth-input:focus {
      border-color: rgba(139,92,246,0.55);
      background: rgba(0,0,0,0.45);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12), 0 0 20px rgba(139,92,246,0.08);
    }

    .auth-input:hover:not(:focus) {
      border-color: rgba(255,255,255,0.16);
    }

    .auth-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .auth-error.visible { display: flex; }

    .auth-success {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #6ee7b7;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .auth-success.visible { display: flex; }

    .auth-submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.22s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 24px rgba(139,92,246,0.3);
      margin-top: 4px;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
    }

    .auth-submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(139,92,246,0.5), 0 8px 24px rgba(0,0,0,0.4);
    }

    .auth-submit-btn:active { transform: translateY(0); }

    .auth-submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-back {
      display: flex;
      justify-content: center;
      margin-top: 22px;
    }

    .auth-back-link {
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-back-link:hover { color: #a78bfa; }

    /* ── Mobile responsive ── */
    @media (max-width: 480px) {
      .auth-wrap { padding: 24px 14px; }

      .auth-card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .auth-brand-name { font-size: 16px; }
      .auth-title      { font-size: 20px; }
      .auth-subtitle   { font-size: 12px; }

      /* Prevent iOS auto-zoom on focus */
      .auth-input { font-size: 16px; }

      .auth-tab { font-size: 13px; padding: 8px 12px; }
    }

    @media (max-width: 360px) {
      .auth-card { padding: 22px 16px; border-radius: 16px; }
      .auth-title { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <span class="auth-brand-icon">⚡</span>
        <span class="auth-brand-name">Consistency Tracker</span>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- ── LOGIN FORM ── -->
      <div class="auth-form" id="form-login">
        <h1 class="auth-title">Welcome back 👋</h1>
        <p class="auth-subtitle">Log in to your account to continue</p>

        <div class="auth-error" id="login-error">
          <span>⚠️</span>
          <span id="login-error-msg"></span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="login-email">Email</label>
          <input class="auth-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="login-password">Password</label>
          <input class="auth-input" type="password" id="login-password" placeholder="Your password" autocomplete="current-password" />
        </div>

        <button class="auth-submit-btn" id="login-btn" onclick="handleLogin()">Login →</button>
      </div>

      <!-- ── REGISTER FORM ── -->
      <div class="auth-form" id="form-register">
        <h1 class="auth-title">Create account ✨</h1>
        <p class="auth-subtitle">Join in and start tracking your consistency</p>

        <div class="auth-error" id="register-error">
          <span>⚠️</span>
          <span id="register-error-msg"></span>
        </div>

        <div class="auth-success" id="register-success">
          <span>✅</span>
          <span>Account created! Redirecting...</span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="register-name">Your Name</label>
          <input class="auth-input" type="text" id="register-name" placeholder="e.g. Bikram" autocomplete="name" />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="register-email">Email</label>
          <input class="auth-input" type="email" id="register-email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="register-password">Password</label>
          <input class="auth-input" type="password" id="register-password" placeholder="Create a password" autocomplete="new-password" />
        </div>

        <button class="auth-submit-btn" id="register-btn" onclick="handleRegister()">Create Account →</button>
      </div>

      <!-- Back to home -->
      <div class="auth-back">
        <a href="landing.html" class="auth-back-link">← Back to home</a>
      </div>

    </div>
  </div>

  <script>
    const API = '';  // Empty string means same origin

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      clearErrors();
    }

    function clearErrors() {
      ['login-error', 'register-error', 'register-success'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('visible');
      });
    }

    function showError(formId, message) {
      const el = document.getElementById(formId + '-error');
      document.getElementById(formId + '-error-msg').textContent = message;
      el.classList.add('visible');
    }

    // ── Login ──────────────────────────────────────────────────
    async function handleLogin() {
      clearErrors();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showError('login', 'Please fill in all fields.');
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError('login', data.message || 'Login failed.');
          return;
        }

        // Save user info to localStorage
        localStorage.setItem('userId', data._id);
        localStorage.setItem('userName', data.name);
        localStorage.setItem('userEmail', data.email);

        window.location.replace('index.html');
      } catch (err) {
        showError('login', 'Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login →';
      }
    }

    // ── Register ───────────────────────────────────────────────
    async function handleRegister() {
      clearErrors();
      const name     = document.getElementById('register-name').value.trim();
      const email    = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;

      if (!name || !email || !password) {
        showError('register', 'Please fill in all fields.');
        return;
      }

      if (password.length < 4) {
        showError('register', 'Password must be at least 4 characters.');
        return;
      }

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError('register', data.message || 'Registration failed.');
          return;
        }

        // Show success, save and redirect
        document.getElementById('register-success').classList.add('visible');
        localStorage.setItem('userId', data._id);
        localStorage.setItem('userName', data.name);
        localStorage.setItem('userEmail', data.email);

        setTimeout(() => window.location.replace('index.html'), 800);

      } catch (err) {
        showError('register', 'Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    }

    // ── Allow Enter key to submit ──────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const activeForm = document.querySelector('.auth-form.active');
      if (!activeForm) return;
      if (activeForm.id === 'form-login') handleLogin();
      else handleRegister();
    });

    // ── Read URL tab param and redirect if already logged in ───
    (function init() {
      if (localStorage.getItem('userId')) {
        window.location.replace('index.html');
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const tab = params.get('tab');
      switchTab(tab === 'register' ? 'register' : 'login');
    })();
  </script>
</body>
</html>
