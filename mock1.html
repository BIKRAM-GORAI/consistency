<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Management - Mock Exam 1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 850px; margin: 0 auto; padding: 20px; background-color: #f0f4f8; }
        .quiz-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-weight: bold; }
        .question { margin-bottom: 30px; padding: 25px; border: 1px solid #e1e8ed; border-radius: 12px; background-color: #ffffff; transition: all 0.3s ease; }
        .question:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .question-text { font-size: 1.15em; font-weight: 600; color: #2c3e50; margin-bottom: 15px; }
        .metadata { font-size: 0.85em; color: #3498db; margin-bottom: 15px; display: block; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px 20px; border: 2px solid #edf2f7; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; background: #fff; position: relative; }
        .option:hover { background-color: #f7fafc; border-color: #cbd5e0; }
        .selected { background-color: #ebf8ff !important; border-color: #3182ce !important; }
        .correct { background-color: #f0fff4 !important; border-color: #38a169 !important; color: #22543d; font-weight: bold; }
        .incorrect { background-color: #fff5f5 !important; border-color: #e53e3e !important; color: #742a2a; }
        #submit-btn { display: block; width: 100%; padding: 20px; background: #3182ce; color: white; border: none; border-radius: 10px; font-size: 1.25em; font-weight: bold; cursor: pointer; margin-top: 40px; transition: background 0.3s ease; box-shadow: 0 4px 6px rgba(49, 130, 206, 0.2); }
        #submit-btn:hover { background: #2b6cb0; }
        #result { margin-top: 30px; padding: 25px; border-radius: 12px; font-size: 1.5em; font-weight: bold; text-align: center; display: none; background-color: #edf2f7; border: 2px solid #3182ce; color: #2c5282; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Principles of Management</h1>
    <div class="subtitle">Mock Exam 1 | Course ID: noc26_mg72</div>
    <div id="quiz"></div>
    <button id="submit-btn">Grade My Exam</button>
    <div id="result"></div>
</div>

<script>
const quizData = [
    { q: "Q1. Which of the following best defines 'Management' according to the lecture notes?", a: "B", options: { A: "The process of maximizing profit for shareholders.", B: "The process of coordinating and overseeing the work of others so that activities are completed efficiently and effectively.", C: "The art of leading people without formal authority.", D: "The function of setting organizational goals without involvement in execution." }, meta: "Source: Lecture_W1L18 | Difficulty: Easy" },
    { q: "Q2. Which statement accurately reflects the relationship between efficiency and effectiveness?", a: "C", options: { A: "Effectiveness is always more important than efficiency.", B: "Efficiency focuses on the ends, while effectiveness focuses on the means.", C: "Success in management requires a constant balance between both efficiency and effectiveness.", D: "High efficiency automatically leads to high effectiveness." }, meta: "Source: Lecture_W1L18 | Difficulty: Medium" },
    { q: "Q3. Which roles would a CEO primarily engage in when conceptualizing innovation and making high-stakes decisions during a crisis?", a: "C", options: { A: "Figurehead and Spokesperson", B: "Monitor and Disseminator", C: "Entrepreneur and Disturbance Handler", D: "Leader and Negotiator" }, meta: "Source: Lecture_W1L19 | Difficulty: Hard" },
    { q: "Q4. Which managerial skill is described as 'job-specific knowledge and proficiency' critical for First-Line Managers?", a: "C", options: { A: "Conceptual Skills", B: "Human Skills", C: "Technical Skills", D: "Strategic Skills" }, meta: "Source: Lecture_W1L19 | Difficulty: Easy" },
    { q: "Q5. The Tylenol crisis example is a prime illustration of which management approach?", a: "D", options: { A: "Mainstream Management", B: "Bureaucratic Control", C: "Contingency Management", D: "Multistream Management" }, meta: "Source: Lecture_W1L20 | Difficulty: Medium" },
    { q: "Q6. Which characteristic is *not* associated with the 'New Workplace'?", a: "C", options: { A: "Technology is digital and e-business driven.", B: "Work structure is flexible, virtual, and team-based.", C: "Management style is 'Command and Control.'", D: "Primary resources are information and knowledge." }, meta: "Source: Lecture_W1L21 | Difficulty: Hard" },
    { q: "Q7. Which leadership theory asserts that leaders are 'born' with specific personality or physical traits?", a: "C", options: { A: "Behavioral Theory", B: "Contingency Theory", C: "Trait Theory", D: "Path-Goal Theory" }, meta: "Source: Lecture_W10L82 | Difficulty: Easy" },
    { q: "Q8. In Blake and Mouton's Managerial Grid, which leadership style is considered ideal?", a: "D", options: { A: "Impoverished Management", B: "Task Management", C: "Country Club Management", D: "Team Management" }, meta: "Source: Lecture_W10L82 | Difficulty: Medium" },
    { q: "Q9. What is the key difference between Fiedler's Model and Situational Leadership Theory (SLT)?", a: "B", options: { A: "Fiedler assumes a leader's style is flexible; SLT assumes it is fixed.", B: "Fiedler matches a fixed leader to a situation; SLT matches a flexible leader to a follower's stage.", C: "Fiedler focuses on follower readiness; SLT focuses on situational favorability.", D: "Fiedler's model is behavioral; SLT is trait-based." }, meta: "Source: Lecture_W10L83 | Difficulty: Hard" },
    { q: "Q10. In SLT, which style is most appropriate for R1 followers (unable and unwilling/insecure)?", a: "C", options: { A: "Selling", B: "Participating", C: "Telling", D: "Delegating" }, meta: "Source: Lecture_W10L83 | Difficulty: Easy" },
    { q: "Q11. A manager providing rewards contingent on performance is primarily exhibiting which style?", a: "C", options: { A: "Transformational Leadership", B: "Charismatic Leadership", C: "Transactional Leadership", D: "Laissez-Faire Leadership" }, meta: "Source: Lecture_W10L84 | Difficulty: Medium" },
    { q: "Q12. In Path-Goal Theory, if subordinates are experienced and the task is complex, which style is most appropriate?", a: "C", options: { A: "Directive", B: "Supportive", C: "Participative", D: "Achievement-Oriented" }, meta: "Source: Lecture_W10L84 | Difficulty: Hard" },
    { q: "Q13. What is identified as the 'bedrock of sustainable organizational success' for authentic leaders?", a: "B", options: { A: "Coercive Power", B: "Consistency between actions and values", C: "High formal power", D: "Charisma" }, meta: "Source: Lecture_W10L85 | Difficulty: Easy" },
    { q: "Q14. Which of the following is a characteristic of Referent Power?", a: "C", options: { A: "Based on fear of negative results.", B: "Derived from special skills or knowledge.", C: "Influence based on desirable personal traits or admiration.", D: "Granted by position in the hierarchy." }, meta: "Source: Lecture_W10L85 | Difficulty: Medium" },
    { q: "Q15. Which communication stage involves the receiver interpreting the message based on culture and experience?", a: "C", options: { A: "Encoding", B: "Channel", C: "Decoding", D: "Feedback" }, meta: "Source: Lecture_W11L88 | Difficulty: Medium" },
    { q: "Q16. Which barrier arises from issues related to the meaning of words, language, and symbols?", a: "C", options: { A: "Physical Barrier", B: "Socio-Psychological Barrier", C: "Semantic Barrier", D: "Organizational Barrier" }, meta: "Source: Lecture_W11L89 | Difficulty: Easy" },
    { q: "Q17. According to the lecture, which of the following is a behavior of an effective listener?", a: "C", options: { A: "Being easily distracted.", B: "Holding onto preconceived notions.", C: "Asking clarifying questions.", D: "Disregarding information that doesn't fit their view." }, meta: "Source: Lecture_W11L89 | Difficulty: Medium" },
    { q: "Q18. Which of the following is an example of a 'crossed transaction' in Transactional Analysis?", a: "B", options: { A: "Manager (Adult) and Employee (Adult) discuss goals logically.", B: "Manager (Adult) asks a rational question; Employee responds defensively (Child).", C: "Employee (Child) asks for help; Manager responds supportively (Parent).", D: "Manager (Parent) gives advice; Employee accepts obediently (Child)." }, meta: "Source: Lecture_W11L90 | Difficulty: Hard" },
    { q: "Q19. Which quadrant of the Johari Window represents traits others see in you, but you don't?", a: "B", options: { A: "Open/Public", B: "Blind", C: "Hidden / Private", D: "Unknown" }, meta: "Source: Lecture_W11L90 | Difficulty: Easy" },
    { q: "Q20. Which small-group network results in fast communication and high member satisfaction through active/free communication?", a: "C", options: { A: "Chain Network", B: "Wheel Network", C: "All-Channel Network", D: "Star Network" }, meta: "Source: Lecture_W11L91 | Difficulty: Medium" },
    { q: "Q21. According to Media Richness Theory, which channel is best for resolving interpersonal conflict?", a: "C", options: { A: "Email", B: "Formal Reports", C: "Face-to-face conversations", D: "Bulletins" }, meta: "Source: Lecture_W11L92 | Difficulty: Hard" },
    { q: "Q22. What is defined as a systematic, integrated approach to improving groups/organizations based on humanistic values?", a: "C", options: { A: "Managerial Training", B: "Management Development", C: "Organizational Development (OD)", D: "Strategic Planning" }, meta: "Source: Lecture_W12L100 | Difficulty: Easy" },
    { q: "Q23. Which organizational structure is highly conducive to innovation due to rapid communication and adaptability?", a: "D", options: { A: "Mechanistic Structure", B: "Bureaucratic Structure", C: "Hierarchical Structure", D: "Organic Structure" }, meta: "Source: Lecture_W12L101 | Difficulty: Medium" },
    { q: "Q24. What is the primary cause of the 'Crisis of Autonomy' in Greiner's Model?", a: "B", options: { A: "Founding entrepreneurs lack management skills.", B: "Creative individuals feel stifled by new bureaucracy and centralized control.", C: "Top executives feel they are losing control as autonomous divisions pursue own objectives.", D: "The proliferation of systems leads to red tape." }, meta: "Source: Lecture_W12L96 | Difficulty: Hard" },
    { q: "Q25. Which type of organizational change is gradual, incremental, and narrowly focused (e.g., TQM)?", a: "C", options: { A: "Revolutionary Change", B: "Frame-Breaking Change", C: "Evolutionary Change", D: "Frame-Bending Change" }, meta: "Source: Lecture_W12L97 | Difficulty: Easy" },
    { q: "Q26. Which resistance strategy involves covertly influencing others by twisting facts or giving a resistor a desirable role?", a: "D", options: { A: "Education & Communication", B: "Participation & Involvement", C: "Negotiation", D: "Manipulation & Co-optation" }, meta: "Source: Lecture_W12L98 | Difficulty: Medium" },
    { q: "Q27. Which model focuses on an organization's positive elements to build 'what will be' via the '4-D Model'?", a: "D", options: { A: "Lewin's 3-Step Model", B: "Action Research", C: "Force-Field Analysis", D: "Appreciative Inquiry" }, meta: "Source: Lecture_W12L99 | Difficulty: Hard" },
    { q: "Q28. What was Frederick Winslow Taylor's core idea in Scientific Management?", a: "B", options: { A: "To focus on the social context of work.", B: "To find the 'one best way' for every job.", C: "To develop a hierarchy of needs.", D: "To emphasize employee participation." }, meta: "Source: Lecture_W2L24 | Difficulty: Easy" },
    { q: "Q29. What did the Hawthorne Studies conclude about worker productivity?", a: "B", options: { A: "Financial incentives are the main driver.", B: "Social and psychological factors like morale have a greater impact than physical conditions.", C: "Advanced machinery is the most important factor.", D: "Clear rules and regulations drive productivity." }, meta: "Source: Lecture_W2L26 | Difficulty: Medium" },
    { q: "Q30. What is the central idea of the Contingency Approach to management?", a: "B", options: { A: "All management principles work the same everywhere.", B: "Performance depends on a logical fit between practices and the specific situation.", C: "Organizations are closed systems.", D: "The 'one best way' can always be found through scientific study." }, meta: "Source: Lecture_W2L27 | Difficulty: Medium" }
];

const quizContainer = document.getElementById('quiz');
const submitBtn = document.getElementById('submit-btn');
const resultContainer = document.getElementById('result');

function buildQuiz() {
    quizData.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.classList.add('question');
        qDiv.innerHTML = `
            <div class="metadata">${item.meta}</div>
            <div class="question-text">${item.q}</div>
            <div class="options" data-index="${index}">
                ${Object.entries(item.options).map(([key, val]) => `
                    <div class="option" data-key="${key}">
                        <strong>${key})</strong> ${val}
                    </div>
                `).join('')}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
}

function showResults() {
    let score = 0;
    const questions = document.querySelectorAll('.question');

    quizData.forEach((item, index) => {
        const selected = questions[index].querySelector('.selected');
        const options = questions[index].querySelectorAll('.option');
        
        options.forEach(opt => {
            const optKey = opt.getAttribute('data-key');
            if (optKey === item.a) {
                opt.classList.add('correct');
            }
            if (selected && selected === opt && optKey !== item.a) {
                opt.classList.add('incorrect');
            }
        });

        if (selected && selected.getAttribute('data-key') === item.a) {
            score++;
        }
    });

    resultContainer.style.display = 'block';
    resultContainer.innerHTML = `Practice Exam Complete!<br>Your Total Score: ${score} / ${quizData.length} (${Math.round((score/quizData.length)*100)}%)`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

buildQuiz();
submitBtn.addEventListener('click', showResults);
</script>

</body>
</html>
