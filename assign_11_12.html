<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Management - Assignments Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
        .quiz-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 10px; }
        h2 { color: #5f6368; border-bottom: 2px solid #e8eaed; padding-bottom: 10px; margin-top: 40px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fafafa; }
        .question-text { font-size: 1.05em; font-weight: 600; color: #202124; margin-bottom: 12px; white-space: pre-wrap; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px 15px; border: 2px solid #dadce0; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; background: white; }
        .option:hover { background-color: #f8f9fa; border-color: #bdc1c6; }
        .selected { background-color: #e8f0fe !important; border-color: #1a73e8 !important; }
        .correct { background-color: #e6f4ea !important; border-color: #34a853 !important; color: #137333; font-weight: bold; }
        .incorrect { background-color: #fce8e6 !important; border-color: #d93025 !important; color: #a50e0e; }
        #submit-btn { display: block; width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #result { margin-top: 30px; padding: 20px; border-radius: 8px; font-size: 1.3em; font-weight: bold; text-align: center; display: none; background-color: #fff; border: 2px solid #1a73e8; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Principles of Management Practice</h1>
    <p style="text-align: center;">Extracted from Weekly Assignments</p>

    <div id="quiz"></div>
    <button id="submit-btn">Check My Answers</button>
    <div id="result"></div>
</div>

<script>
const quizData = [
    // ASSIGNMENT 12/WEEK 12 (Screenshots 1-3)
    { 
        section: "Change Management Assignment",
        q: "1) Which of the following statement are TRUE in respect effective change management in the organizations :\n\ni. Organizational should have structural rigidity\nii Organizations should not have any focus on learning\niii. Organization should have emphasis on learning, scope for flexibility in order to learn, adapt and change\niv Emphasis on learning will lead to innovation and creativity", 
        a: "B", 
        options: { 
            A: "Organizational should have structural rigidity", 
            B: "Organisation should have emphasis on learning, scope for flexibility in order to learn, adapt and change and Emphasis on learning will lead to innovation and creativity", 
            C: "Organization should not have any focus on learning and Emphasis on learning will lead to innovation and creativity", 
            D: "All of these" 
        } 
    },
    { 
        q: "2) Select the relevant factor that can result in organizational inertia", 
        a: "D", 
        options: { 
            A: "Risk taking ability", 
            B: "Desire to minimize the rewards", 
            C: "Excessive cultural adhocracy", 
            D: "Risk aversion" 
        } 
    },
    { 
        q: "3) As per Weitsal and Johnson model, what are the stages/ phases involved in ‘DECLINE’ in an organization?", 
        a: "A", 
        options: { 
            A: "Blinded → Inaction → Faulty Action → Crisis → Dissolution", 
            B: "Faulty Action → Blinded → Crisis → Inaction → Dissolution", 
            C: "Blinded → Faulty Action → Dissolution → Crisis → Inaction", 
            D: "Inaction → Blinded → Crisis → Dissolution → Faulty Action" 
        } 
    },
    { 
        q: "4) Match the following Organizational Development (OD) interventions with their correct descriptions:\nColumn A (Interventions)\n1. Intergroup Training\n2. Organizational Mirroring\n3. Process Consultation\n4. Sensitivity / T-Group Training\n\nColumn B (Descriptions)\na. Helps different departments understand mutual problems and improve coordination\nb. A consultant helps members gain insight into their behavior through unstructured group interactions\nc. External consultant gathers feedback from various groups about how they perceive a focal group\nd. A consultant works with a group to improve communication, decision-making, and interpersonal processes", 
        a: "A", 
        options: { 
            A: "1—a, 2—c, 3—d, 4—b", 
            B: "1—b, 2—d, 3—c, 4—a", 
            C: "1—c, 2—b, 3—a, 4—d", 
            D: "1—d, 2—a, 3—b, 4—c" 
        } 
    },
    { 
        q: "5) Which set BEST represents individual-level sources of resistance to change?", 
        a: "A", 
        options: { 
            A: "Habit, fear of the unknown, selective perception", 
            B: "Group norms, power politics, organizational structure", 
            C: "Departmental conflicts and role ambiguity", 
            D: "Leadership style and authority patterns" 
        } 
    },
    { 
        q: "6) Which managerial approach is MOST effective in reducing employee resistance during change?", 
        a: "D", 
        options: { 
            A: "Educating employees about the change", 
            B: "Involving employees in decision-making", 
            C: "Providing emotional and technical support", 
            D: "All of the these" 
        } 
    },
    { 
        q: "7) In Lewin’s change model, the unfreezing stage mainly focuses on:", 
        a: "C", 
        options: { 
            A: "Measuring post-change outcomes", 
            B: "Institutionalizing new practices", 
            C: "Preparing employees psychologically for change", 
            D: "Replacing old systems immediately" 
        } 
    },
    { 
        q: "8) Before introducing a new work-from-home policy, management communicates the limitations of the existing system and builds urgency. This activity reflects which stage of Lewin’s model?", 
        a: "C", 
        options: { 
            A: "Change", 
            B: "Refreeze", 
            C: "Unfreeze", 
            D: "Evaluation" 
        } 
    },
    { 
        q: "9) Which sequence BEST describes Lewin’s three-stage change process?", 
        a: "C", 
        options: { 
            A: "Awareness → Adoption → Stabilization", 
            B: "Diagnosis → Action → Evaluation", 
            C: "Unfreeze → Change → Refreeze", 
            D: "Plan → Execute → Control" 
        } 
    },
    { 
        q: "10) Employees oppose a new appraisal system because they fear it may reduce their authority and influence. This resistance is MOST related to:", 
        a: "B", 
        options: { 
            A: "Habit", 
            B: "Power and conflict", 
            C: "Lack of communication", 
            D: "Technological complexity" 
        } 
    },

    // ASSIGNMENT 11 (Screenshots 4-6)
    { 
        section: "Organizational Communication Assignment",
        q: "1) He believes he communicates very clearly during meetings. However, his team reports that he frequently uses technical jargon that confuses others. Rahul becomes aware of this only after receiving peer feedback. Which Johari Window area is primarily reduced through this feedback?", 
        a: "B", 
        options: { 
            A: "Open Area – because everyone already knew it", 
            B: "Blind Area – because others knew it, but Rahul did not", 
            C: "Hidden Area – because Rahul concealed it intentionally", 
            D: "Unknown Area – because it was unknown to all" 
        } 
    },
    { 
        q: "2) A manager evaluates multiple alternatives, examines data objectively, and chooses the most rational solution without emotional bias. This behavior reflects which ego state?", 
        a: "C", 
        options: { 
            A: "Nurturing Parent", 
            B: "Critical Parent", 
            C: "Adult", 
            D: "Free Child" 
        } 
    },
    { 
        q: "3) Statements such as “You must follow the rules exactly” and “That’s unacceptable behavior” are MOST characteristic of which ego state?", 
        a: "D", 
        options: { 
            A: "Adapted Child", 
            B: "Free Child", 
            C: "Adult", 
            D: "Critical Parent" 
        } 
    },
    { 
        q: "4) Assertion (A): Using e-mail to communicate highly ambiguous information can lead to oversimplification.\nReason (R): E-mail is a low-rich medium that cannot effectively handle multiple cues.", 
        a: "A", 
        options: { 
            A: "Both A and R are true, and R is the correct explanation of A", 
            B: "Both A and R are true, but R is NOT the correct explanation of A", 
            C: "A is true but R is false", 
            D: "A is false but R is true" 
        } 
    },
    { 
        q: "5) In which communication network does one individual act as the central hub, controlling all information flow?", 
        a: "D", 
        options: { 
            A: "Chain", 
            B: "Circle", 
            C: "All-channel", 
            D: "Wheel" 
        } 
    },
    { 
        q: "6) Which statement BEST distinguishes instant messaging from email in organizations?", 
        a: "C", 
        options: { 
            A: "Instant messaging is less interactive", 
            B: "Email is more informal than instant messaging", 
            C: "Instant messaging enables rapid, simultaneous interactions", 
            D: "Email supports real-time group discussions better" 
        } 
    },
    { 
        q: "7) A leader needs to discuss layoffs with employees, ensuring emotional support and two-way communication. According to Media Richness Theory, the most appropriate medium is:", 
        a: "D", 
        options: { 
            A: "Email", 
            B: "Voice note", 
            C: "Internal newsletter", 
            D: "Face-to-face meeting" 
        } 
    },
    { 
        q: "8) According to the ‘Media Richness Model’, which of the following communication channels is most appropriate for conveying highly complex and ambiguous information?", 
        a: "D", 
        options: { 
            A: "Email", 
            B: "Fax", 
            C: "Text message", 
            D: "Face-to-face dialogue" 
        } 
    },
    { 
        q: "9) After hearing rumors about possible layoffs, employees trust information shared by colleagues more than the official email from management. Why is grapevine communication perceived as more credible in this situation?", 
        a: "C", 
        options: { 
            A: "It is always accurate", 
            B: "It follows formal authority", 
            C: "It spreads informally and emotionally across levels", 
            D: "It is legally verified" 
        } 
    },
    { 
        q: "10) A team introduces regular feedback sessions and open discussions, resulting in increased trust and transparency. Which outcome is MOST likely?", 
        a: "D", 
        options: { 
            A: "Expansion of the Blind Area", 
            B: "Reduction of the Open Area", 
            C: "Increase in the Unknown Area", 
            D: "Expansion of the Open Area" 
        } 
    }
];

const quizContainer = document.getElementById('quiz');
const submitBtn = document.getElementById('submit-btn');
const resultContainer = document.getElementById('result');

function buildQuiz() {
    quizData.forEach((item, index) => {
        if (item.section) {
            const h2 = document.createElement('h2');
            h2.innerText = item.section;
            quizContainer.appendChild(h2);
        }
        
        const qDiv = document.createElement('div');
        qDiv.classList.add('question');
        qDiv.innerHTML = `
            <div class="question-text">${item.q}</div>
            <div class="options" data-index="${index}">
                ${Object.entries(item.options).map(([key, val]) => `
                    <div class="option" data-key="${key}">${key}) ${val}</div>
                `).join('')}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
}

function showResults() {
    let score = 0;
    const questions = document.querySelectorAll('.question');

    quizData.forEach((item, index) => {
        const selected = questions[index].querySelector('.selected');
        const options = questions[index].querySelectorAll('.option');
        
        options.forEach(opt => {
            const optKey = opt.getAttribute('data-key');
            if (optKey === item.a) {
                opt.classList.add('correct');
            }
            if (selected && selected === opt && optKey !== item.a) {
                opt.classList.add('incorrect');
            }
        });

        if (selected && selected.getAttribute('data-key') === item.a) {
            score++;
        }
    });

    resultContainer.style.display = 'block';
    resultContainer.innerHTML = `Practice Complete! Score: ${score} / ${quizData.length}`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

buildQuiz();
submitBtn.addEventListener('click', showResults);
</script>

</body>
</html>
