<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Management - Mock Exam 4</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 850px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; }
        .quiz-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #5f6368; margin-bottom: 30px; font-weight: 500; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; background-color: #fafafa; }
        .question-text { font-size: 1.1em; font-weight: 600; color: #202124; margin-bottom: 12px; }
        .metadata { font-size: 0.85em; color: #70757a; margin-bottom: 15px; font-style: italic; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px 15px; border: 2px solid #dadce0; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; background: white; }
        .option:hover { background-color: #f8f9fa; border-color: #bdc1c6; }
        .selected { background-color: #e8f0fe !important; border-color: #1a73e8 !important; }
        .correct { background-color: #e6f4ea !important; border-color: #34a853 !important; color: #137333; font-weight: bold; }
        .incorrect { background-color: #fce8e6 !important; border-color: #d93025 !important; color: #a50e0e; }
        #submit-btn { display: block; width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 30px; transition: background 0.3s; }
        #submit-btn:hover { background: #1765cc; }
        #result { margin-top: 30px; padding: 20px; border-radius: 8px; font-size: 1.3em; font-weight: bold; text-align: center; display: none; background-color: #fff; border: 2px solid #1a73e8; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Principles of Management</h1>
    <div class="subtitle">Mock Exam 4 | Course ID: noc26_mg72</div>
    <div id="quiz"></div>
    <button id="submit-btn">Finish and Grade Exam</button>
    <div id="result"></div>
</div>

<script>
const quizData = [
    { q: "Q1. What are the four fundamental functions of management, often referred to as POLC?", a: "C", options: { A: "Planning, Organizing, Leading, Communicating", B: "Producing, Operating, Leading, Controlling", C: "Planning, Organizing, Leading, Controlling", D: "Prioritizing, Optimizing, Leveraging, Coordinating" }, meta: "Source: Lecture_W1L18 | Difficulty: Easy" },
    { q: "Q2. Which management skill is primarily crucial for first-line managers, who directly supervise employees performing operational tasks?", a: "C", options: { A: "Conceptual Skills", B: "Human Skills", C: "Technical Skills", D: "Strategic Skills" }, meta: "Source: Lecture_W1L19 | Difficulty: Easy" },
    { q: "Q3. According to the lecture, what is the primary source of sustainable competitive advantage in a dynamic market?", a: "B", options: { A: "Low labor costs", B: "Innovation", C: "Aggressive marketing", D: "Government subsidies" }, meta: "Source: Lecture_W1L21 | Difficulty: Easy" },
    { q: "Q4. Which leadership style is characterized by leaders who inspire and motivate followers to transcend their self-interests for the good of the organization?", a: "D", options: { A: "Transactional Leadership", B: "Laissez-Faire Leadership", C: "Charismatic Leadership", D: "Transformational Leadership" }, meta: "Source: Lecture_W10L84 | Difficulty: Easy" },
    { q: "Q5. What is the term for anything that interferes with the transmission or understanding of a message in the communication process?", a: "C", options: { A: "Feedback", B: "Channel", C: "Noise", D: "Medium" }, meta: "Source: Lecture_W11L88 | Difficulty: Easy" },
    { q: "Q6. What is the term for long-term, future-oriented programs focused on the progress a person makes in learning how to manage and plan strategically?", a: "C", options: { A: "Managerial Training", B: "Organizational Development", C: "Management Development", D: "Sensitivity Training" }, meta: "Source: Lecture_W12L100 | Difficulty: Easy" },
    { q: "Q7. What is the term for the formal system of task and authority relationships that controls how people coordinate actions and use resources to achieve goals?", a: "D", options: { A: "Organizational Culture", B: "Organizational Design", C: "Organizational Theory", D: "Organizational Structure" }, meta: "Source: Lecture_W12L95 | Difficulty: Easy" },
    { q: "Q8. What is the term for a broad, long-term, and aspirational statement that provides an organization with its overall direction?", a: "D", options: { A: "Mission", B: "Goal", C: "Strategy", D: "Vision" }, meta: "Source: Lecture_W3L30 | Difficulty: Easy" },
    { q: "Q9. What is the primary goal of a 'Cost Leadership' competitive strategy?", a: "B", options: { A: "To offer unique products at premium prices.", B: "To become the lowest-cost producer in the industry.", C: "To focus on a narrow market segment.", D: "To innovate rapidly and disrupt the market." }, meta: "Source: Lecture_W3L34 | Difficulty: Easy" },
    { q: "Q10. What is the tendency to underestimate the influence of external factors and overestimate the influence of internal factors when judging the behavior of others?", a: "C", options: { A: "Self-Serving Bias", B: "Halo Effect", C: "Fundamental Attribution Error", D: "Selective Perception" }, meta: "Source: Lecture_W5L43 | Difficulty: Easy" },
    { q: "Q11. The 'Multistream Management' approach is characterized by its focus on:", a: "B", options: { A: "Maximizing profit and productivity through materialistic means.", B: "Creating and balancing well-being for multiple stakeholders.", C: "Centralized decision-making and top-down control.", D: "Prioritizing shareholder value above all else." }, meta: "Source: Lecture_W1L20 | Difficulty: Medium" },
    { q: "Q12. In Fiedler's Contingency Model, a leader's style is considered:", a: "B", options: { A: "Flexible and adaptable to the situation.", B: "Fixed and unchangeable.", C: "Developed through training and experience.", D: "Dependent on follower readiness." }, meta: "Source: Lecture_W10L83 | Difficulty: Medium" },
    { q: "Q13. Which type of power is generally more effective for driving employee motivation, performance, and commitment?", a: "D", options: { A: "Coercive Power", B: "Reward Power", C: "Legitimate Power", D: "Personal Power" }, meta: "Source: Lecture_W10L85 | Difficulty: Medium" },
    { q: "Q14. Which type of communication barrier arises from issues related to the meaning of words, language, and symbols, such as jargon or ambiguous terms?", a: "C", options: { A: "Physical Barrier", B: "Socio-Psychological Barrier", C: "Semantic Barrier", D: "Organizational Barrier" }, meta: "Source: Lecture_W11L89 | Difficulty: Medium" },
    { q: "Q15. Which formal small-group network is characterized by all group members communicating actively and freely with one another?", a: "C", options: { A: "Chain Network", B: "Wheel Network", C: "All-Channel Network", D: "Star Network" }, meta: "Source: Lecture_W11L91 | Difficulty: Medium" },
    { q: "Q16. Which of Peter Senge's Five Disciplines emphasizes seeing the 'whole' organization as a complex system of interdependent parts?", a: "C", options: { A: "Personal Mastery", B: "Mental Models", C: "Systems Thinking", D: "Team Learning" }, meta: "Source: Lecture_W12L101 | Difficulty: Medium" },
    { q: "Q17. According to Greiner's Model of Organizational Growth, the 'Crisis of Autonomy' typically arises during which stage?", a: "B", options: { A: "Growth through Creativity", B: "Growth through Direction", C: "Growth through Delegation", D: "Growth through Coordination" }, meta: "Source: Lecture_W12L96 | Difficulty: Medium" },
    { q: "Q18. Which strategy for managing resistance to change involves offering incentives or trade-offs to a specific group?", a: "C", options: { A: "Education & Communication", B: "Participation & Involvement", C: "Negotiation", D: "Coercion" }, meta: "Source: Lecture_W12L98 | Difficulty: Medium" },
    { q: "Q19. The Hawthorne Studies primarily concluded that:", a: "C", options: { A: "Physical working conditions are the sole determinant.", B: "Financial incentives are the most powerful motivators.", C: "Social and psychological factors have a greater impact on productivity.", D: "Strict adherence to rules leads to optimal efficiency." }, meta: "Source: Lecture_W2L26 | Difficulty: Medium" },
    { q: "Q20. The 'Contingency Approach' to management suggests that:", a: "B", options: { A: "There is one universally applicable set of principles.", B: "Management techniques should be chosen based on the specific situation.", C: "Organizations should always adopt an organic structure.", D: "All decisions must be data-driven and quantitative." }, meta: "Source: Lecture_W2L27 | Difficulty: Medium" },
    { q: "Q21. Which external environmental factor includes demographic trends, lifestyle changes, and societal values?", a: "C", options: { A: "Political", B: "Economic", C: "Socio-cultural", D: "Technological" }, meta: "Source: Lecture_W3L31 | Difficulty: Medium" },
    { q: "Q22. In the BCG Matrix, which category represents mature, successful businesses that generate more cash than they consume?", a: "B", options: { A: "Stars", B: "Cash Cows", C: "Question Marks", D: "Dogs" }, meta: "Source: Lecture_W3L33 | Difficulty: Medium" },
    { q: "Q23. In Transactional Analysis, a 'crossed transaction' occurs when:", a: "B", options: { A: "Response comes from the same ego state targeted.", B: "Response comes from a different ego state than the one targeted.", C: "Both parties communicate from the Adult ego state.", D: "The Parent ego state dominates the conversation." }, meta: "Source: Lecture_W11L90 | Difficulty: Hard" },
    { q: "Q24. According to Media Richness Theory, for which type of message would a face-to-face conversation be most appropriate?", a: "C", options: { A: "Routine announcement of policy change.", B: "Simple confirmation of a meeting time.", C: "Resolving an interpersonal conflict between team members.", D: "Disseminating a weekly sales report." }, meta: "Source: Lecture_W11L92 | Difficulty: Hard" },
    { q: "Q25. A company that proactively transforms its business model anticipating a future threat engages in which type of change?", a: "D", options: { A: "Fine-Tuning", B: "Adaptation", C: "Frame-Breaking", D: "Frame-Bending" }, meta: "Source: Lecture_W12L97 | Difficulty: Hard" },
    { q: "Q26. Which statement best describes the 'Unfreezing' stage in Lewin's 3-Step Model?", a: "B", options: { A: "Stabilizing the organization in its new state.", B: "Creating motivation for change by challenging the status quo.", C: "Implementing new behaviors and values.", D: "Evaluating the impact of actions." }, meta: "Source: Lecture_W12L99 | Difficulty: Hard" },
    { q: "Q27. Frederick W. Taylor's Scientific Management was criticized for:", a: "C", options: { A: "Failing to increase productivity.", B: "Overemphasizing the social context of work.", C: "Not appreciating the social context of work or workers' higher needs.", D: "Ignoring standardized work methods." }, meta: "Source: Lecture_W2L24 | Difficulty: Hard" },
    { q: "Q28. According to the Resource-Based View (RBV), for a resource to provide sustainable advantage, it must be:", a: "B", options: { A: "Valuable, Reproducible, Inexpensive, Numerous.", B: "Valuable, Rare, Imperfectly Imitable, Non-substitutable.", C: "Visible, Reliable, Innovative, Necessary.", D: "Versatile, Responsive, Integrated, Networked." }, meta: "Source: Lecture_W3L32 | Difficulty: Hard" },
    { q: "Q29. The Delphi Method is designed to achieve consensus while eliminating which potential bias?", a: "B", options: { A: "Self-serving bias", B: "Groupthink and dominant personalities", C: "Confirmation bias", D: "Availability bias" }, meta: "Source: Lecture_W4L39 | Difficulty: Hard" },
    { q: "Q30. In a PERT network, the 'Critical Path' refers to:", a: "C", options: { A: "The shortest sequence of tasks.", B: "The sequence with most available slack time.", C: "The longest sequence of dependent tasks determining minimum project time.", D: "Any task involving high risk." }, meta: "Source: Lecture_W4L40 | Difficulty: Hard" }
];

const quizContainer = document.getElementById('quiz');
const submitBtn = document.getElementById('submit-btn');
const resultContainer = document.getElementById('result');

function buildQuiz() {
    quizData.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.classList.add('question');
        qDiv.innerHTML = `
            <div class="question-text">${item.q}</div>
            <div class="metadata">${item.meta}</div>
            <div class="options" data-index="${index}">
                ${Object.entries(item.options).map(([key, val]) => `
                    <div class="option" data-key="${key}">${key}) ${val}</div>
                `).join('')}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });

    document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
        });
    });
}

function showResults() {
    let score = 0;
    const questions = document.querySelectorAll('.question');

    quizData.forEach((item, index) => {
        const selected = questions[index].querySelector('.selected');
        const options = questions[index].querySelectorAll('.option');
        
        options.forEach(opt => {
            const optKey = opt.getAttribute('data-key');
            if (optKey === item.a) {
                opt.classList.add('correct');
            }
            if (selected && selected === opt && optKey !== item.a) {
                opt.classList.add('incorrect');
            }
        });

        if (selected && selected.getAttribute('data-key') === item.a) {
            score++;
        }
    });

    resultContainer.style.display = 'block';
    resultContainer.innerHTML = `Final Score: ${score} / ${quizData.length}<br><span style="font-size: 0.8em; color: #555;">Percentage: ${Math.round((score/quizData.length)*100)}%</span>`;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

buildQuiz();
submitBtn.addEventListener('click', showResults);
</script>

</body>
</html>
