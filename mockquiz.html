    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --error: #dc2626;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .score-panel {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: var(--card);
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border: 2px solid var(--primary);
        }

        .quiz-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            transition: transform 0.2s;
        }

        .question-meta {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .options-list {
            display: grid;
            gap: 10px;
        }

        .option {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option.correct {
            background-color: #dcfce7;
            border-color: var(--success);
            color: #166534;
            font-weight: 600;
        }

        .option.wrong {
            background-color: #fee2e2;
            border-color: var(--error);
            color: #991b1b;
        }

        .option.disabled {
            cursor: default;
        }

        .source-tag {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
            font-size: 0.85rem;
            color: #64748b;
            font-style: italic;
        }

        .difficulty {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .diff-easy { background: #dcfce7; color: #166534; }
        .diff-medium { background: #fef9c3; color: #854d0e; }
        .diff-hard { background: #fee2e2; color: #991b1b; }

        #reset-btn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #reset-btn:hover { background: #eff6ff; }
    </style>
</head>

    let currentScore = 0;
    let answeredQuestions = new Set();

    function renderQuiz() {
        const container = document.getElementById('quiz-content');
        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.id = `q-${index}`;

            card.innerHTML = `
                <div class="question-meta">
                    Question ${index + 1}
                    <span class="difficulty diff-${item.diff.toLowerCase()}">${item.diff}</span>
                </div>
                <div class="question-text">${item.q}</div>
                <div class="options-list" id="opts-${index}">
                    ${item.opts.map((opt, optIdx) => `
                        <div class="option" onclick="checkAnswer(${index}, ${optIdx})">${opt}</div>
                    `).join('')}
                </div>
                <div class="source-tag">Source: ${item.src}</div>
            `;
            container.appendChild(card);
        });
    }

    function checkAnswer(qIdx, optIdx) {
        if (answeredQuestions.has(qIdx)) return;

        const item = quizData[qIdx];
        const optionsList = document.getElementById(`opts-${qIdx}`);
        const options = optionsList.getElementsByClassName('option');
        
        answeredQuestions.add(qIdx);
        
        // Disable further clicking
        Array.from(options).forEach(opt => opt.classList.add('disabled'));

        if (optIdx === item.ans) {
            options[optIdx].classList.add('correct');
            currentScore++;
        } else {
            options[optIdx].classList.add('wrong');
            options[item.ans].classList.add('correct');
        }

        updateScore();
    }

    function updateScore() {
        document.getElementById('score').innerText = currentScore;
        document.getElementById('answered-count').innerText = answeredQuestions.size;
    }

    // Initialize
    renderQuiz();
</script>
